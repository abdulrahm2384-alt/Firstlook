services:
  - type: web
    name: chart-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_TWELVE_DATA_API_KEY
        sync: false # User must provide this in Render dashboard
